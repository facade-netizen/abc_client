<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>{{PAGE_TITLE}}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            font-size: 13px;
        }

        body {
            background: #ececec;
            color: #222;
            overflow: hidden;
        }

        .app-shell {
            width: 1180px;
            margin: 4px auto;
            background: #fff;
            border: 1px solid #bfc7cf;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
        }

        .topbar {
            background: #132838;
            color: white;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
        }

        .topbar h1 {
            font-size: 16px;
            font-weight: 700;
        }

        .topbar button {
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .toolbar {
            background: #eef2f4;
            padding: 12px 10px;
            border-bottom: 1px solid #c9d1d8;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toolbar label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .toolbar select {
            height: 28px;
            min-width: 120px;
            border: 1px solid #aeb8c2;
            background: #fff;
            padding: 0 8px;
        }

        .btn-primary {
            height: 30px;
            padding: 0 18px;
            border: 1px solid #2f6ea3;
            background: linear-gradient(#4d8dc2, #2f6ea3);
            color: white;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
        }

        .content {
            padding: 18px 14px 10px;
            min-height: 720px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: #d8d8d8;
            border: 1px solid #8da0b3;
            padding: 8px 6px;
            text-align: center;
            font-weight: 700;
            color: #17324a;
        }

        tbody td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #d9dee3;
        }

        tbody tr:nth-child(even) {
            background: #f4f5f7;
        }

        .text-right {
            text-align: right;
            padding-right: 14px;
        }

        .negative {
            color: #d10000;
            font-weight: 500;
        }

        .result-button {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #7c7c7c;
            background: white;
            cursor: pointer;
            font-size: 11px;
        }

        .pagination-wrapper {
            margin-top: 82px;
            border-top: 1px solid #e2e2e2;
            padding-top: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .pagination button {
            min-width: 32px;
            height: 24px;
            border: 1px solid #b7b7b7;
            background: #f7f7f7;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .pagination .active {
            background: #2d83c5;
            color: white;
            border-color: #2d83c5;
        }

        .pagination .disabled {
            color: #999;
            background: #efefef;
            cursor: default;
        }

        .page-input {
            width: 56px;
            height: 24px;
            border: 1px solid #b7b7b7;
            border-radius: 4px;
            text-align: center;
        }

        .page-input::-webkit-outer-spin-button,
        .page-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .go-btn {
            height: 24px;
            min-width: 38px;
            border: 1px solid #b7b7b7;
            background: #f7f7f7;
            border-radius: 4px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <div class="topbar">
            <h1 id="pageTitle">Transaction Report</h1>
            <button type="button" onclick="window.close()">× Close</button>
        </div>
        <div class="toolbar">
            <label>
                Sort by
                <select id="sortBy">
                    <option value="betTime">Bet Time</option>
                    <option value="bet">Stake</option>
                    <option value="totalPL">P/L</option>
                </select>
            </label>
            <label>
                of
                <select id="sortOrder">
                    <option value="descending">Descending</option>
                    <option value="ascending">Ascending</option>
                </select>
            </label>
            <label>
                Last
                <select id="lastCount">
                    <option value="15">15</option>
                    <option value="2">2</option>
                    <option value="4">4</option>
                </select>
            </label>
            <button class="btn-primary" type="button" onclick="applyFilters(1)">Get History</button>
        </div>
        <div class="content">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Reference</th>
                            <th>Bet Time</th>
                            <th>Game Name</th>
                            <th>Game Status</th>
                            <th>Round</th>
                            <th>Bet Type</th>
                            <th>Bet</th>
                            <th>Win</th>
                            <th>Total P/L</th>
                            <th>Result</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="pagination-wrapper">
                <div class="pagination" id="paginationBar"></div>
                <input id="pageInput" class="page-input" type="number" min="1" value="1" />
                <button id="goButton" class="go-btn" type="button">GO</button>
            </div>
        </div>
    </div>
    <script>
        const storedData = window.localStorage.getItem('casino_report_data');
        const storedTitle = window.localStorage.getItem('casino_report_title');
        const allData = storedData ? JSON.parse(storedData) : [];
        const tableBody = document.getElementById('tableBody');
        const sortBySelect = document.getElementById('sortBy');
        const sortOrderSelect = document.getElementById('sortOrder');
        const lastCountSelect = document.getElementById('lastCount');
        const paginationBar = document.getElementById('paginationBar');
        const pageInput = document.getElementById('pageInput');
        const goButton = document.getElementById('goButton');
        const pageTitle = document.getElementById('pageTitle');

        if (storedTitle) {
            pageTitle.textContent = storedTitle;
            document.title = storedTitle;
        }

        let currentPage = 1;
        let pageSize = Number(lastCountSelect.value);

        function formatNumber(value) {
            return value === null || value === undefined || value === '' ? '-' : Number(value).toLocaleString('en-US');
        }

        function formatCurrency(value) {
            if (value === null || value === undefined || value === '') return '-';
            const number = Number(value);
            const formatted = number.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            return number < 0 ? `(${formatted.replace('-', '')})` : formatted;
        }

        function formatBetType(value) {
            const val = value == null ? '' : value.toString();
            if (!val) return '-';
            const number = Number(val);
            if (number === 1) return 'Player';
            if (number === 2) return 'Banker';
            if (number === 3) return 'Tie';
            return val;
        }

        function openResultView(transactionId) {
            if (!transactionId) {
                window.alert('No transaction ID available.');
                return;
            }

            fetch('https://rgc.dmxchge.com/api/Casino/betDetail?transactionId=' + encodeURIComponent(transactionId))
                .then(function (response) { return response.json(); })
                .then(function (result) {
                    if (result.status === 200 && result.data && result.data.url) {
                        window.open(result.data.url, '_blank', 'popup=yes,width=1100,height=700,scrollbars=yes');
                    } else {
                        window.alert('Unable to load video result.');
                    }
                })
                .catch(function () {
                    window.alert('Failed to fetch video result.');
                });
        }

        function renderTable(data) {
            if (!data.length) {
                tableBody.innerHTML = '<tr><td class="empty-state" colspan="11">No data available</td></tr>';
                return;
            }

            tableBody.innerHTML = data
                .map((item, index) => {
                    const transactionId = item.transactionId || '';

                    return `
                        <tr>
                            <td>${(currentPage - 1) * pageSize + index + 1}</td>
                            <td>${item.reference || '-'}</td>
                            <td>${item.betTime || '-'}</td>
                            <td>${item.gameName || '-'}</td>
                            <td>${item.gameStatus || '-'}</td>
                            <td>${item.round || '-'}</td>
                            <td>${formatBetType(item.betType)}</td>
                            <td>${formatNumber(item.bet)}</td>
                            <td>${formatNumber(item.win)}</td>
                            <td style="color: ${Number(item.totalPL) < 0 ? '#d32f2f' : '#111827'};">${formatCurrency(item.totalPL)}</td>
                            <td class="result-cell"><button class="result-button" type="button" onclick="openResultView('${transactionId}')">${item.result || '▶'}</button></td>
                        </tr>
                    `;
                })
                .join('');
        }

        function compareValues(a, b, key) {
            const valueA = a[key] || '';
            const valueB = b[key] || '';
            if (key === 'betTime') {
                return new Date(valueA).getTime() - new Date(valueB).getTime();
            }
            if (key === 'totalPL' || key === 'bet' || key === 'win') {
                return Number(valueA) - Number(valueB);
            }
            return valueA.toString().localeCompare(valueB.toString(), undefined, { numeric: true });
        }

        function renderPagination(totalCount) {
            const totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
            pageInput.value = currentPage;
            paginationBar.innerHTML = '';

            const createButton = (label, page, isActive = false, disabled = false) => {
                const button = document.createElement('button');
                button.textContent = label;
                if (isActive) button.classList.add('active');
                if (disabled) button.classList.add('disabled');
                if (!disabled) button.addEventListener('click', () => applyFilters(page));
                return button;
            };

            paginationBar.appendChild(createButton('Prev', Math.max(1, currentPage - 1), false, currentPage === 1));

            const maxButtons = 7;
            let startPage = Math.max(1, currentPage - 3);
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);
            if (endPage - startPage < maxButtons - 1) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            if (startPage > 1) {
                paginationBar.appendChild(createButton('1', 1));
                if (startPage > 2) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.color = '#6b7280';
                    paginationBar.appendChild(ellipsis);
                }
            }

            for (let page = startPage; page <= endPage; page += 1) {
                paginationBar.appendChild(createButton(page.toString(), page, page === currentPage));
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const ellipsis = document.createElement('span');
                    ellipsis.textContent = '...';
                    ellipsis.style.color = '#6b7280';
                    paginationBar.appendChild(ellipsis);
                }
                paginationBar.appendChild(createButton(totalPages.toString(), totalPages));
            }

            paginationBar.appendChild(createButton('Next', Math.min(totalPages, currentPage + 1), false, currentPage === totalPages));
        }

        function applyFilters(page = 1) {
            pageSize = Number(lastCountSelect.value);
            const totalPages = Math.max(1, Math.ceil(allData.length / pageSize));
            currentPage = Math.max(1, Math.min(page, totalPages));

            const sortBy = sortBySelect.value;
            const sortOrder = sortOrderSelect.value;
            const sorted = [...allData].sort((a, b) => {
                const result = compareValues(a, b, sortBy);
                return sortOrder === 'ascending' ? result : -result;
            });

            const from = (currentPage - 1) * pageSize;
            const paged = sorted.slice(from, from + pageSize);
            renderTable(paged);
            renderPagination(sorted.length);
        }

        goButton.addEventListener('click', () => {
            const requestedPage = Number(pageInput.value);
            applyFilters(requestedPage);
        });

        applyFilters(1);
    </script>
</body>

</html>
