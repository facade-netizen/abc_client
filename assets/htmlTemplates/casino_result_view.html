<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Result</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Tahoma, Helvetica, sans-serif;
        }

        body {
            background: #f3f4f6;
            color: #111;
            min-height: 100vh;
        }

        .popup-shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .popup-header {
            display: flex;
            flex-direction: column;
            gap: 0;
            background: #ffffff;
            border-bottom: 1px solid #d1d5db;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #ffffff;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-badge {
            width: 8px;
            height: 24px;
            background: #f59e0b;
            border-radius: 4px;
        }

        .header-title {
            font-size: 15px;
            font-weight: 700;
            color: #111;
        }

        .header-code {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: #1f2937;
            color: #ffffff;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .header-close {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #d1d5db;
            background: #1f2937;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }

        .header-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #111827;
        }

        .header-bottom-left {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .header-bottom h2 {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
        }

        .header-bottom span {
            font-size: 13px;
            color: #f59e0b;
        }

        .popup-content {
            flex: 1;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .popup-content {
            flex: 1;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
        }

        .video-frame {
            width: 100%;
            height: calc(100vh - 112px);
            border: none;
            background: #ffffff;
        }

        .empty-state {
            color: #eee;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="popup-shell">
        <div class="popup-header">
            <div class="header-top">
                <div class="header-left">
                    <div class="header-badge"></div>
                    <div class="header-title" id="pageTitle">Result</div>
                    <span class="header-code" id="topCode">000</span>
                </div>
                <div class="header-right">
                    <button class="header-close" type="button" onclick="window.close()">×</button>
                </div>
            </div>
        </div>
        <div class="popup-content" id="pageBody">
            <div class="empty-state">Loading video...</div>
        </div>
    </div>
    <script>
        const videoUrl = window.localStorage.getItem('casino_video_url') || '';
        const topCode = window.localStorage.getItem('casino_video_code') || '-';
        const pageTitleText = document.getElementById('pageTitle');
        const topCodeElement = document.getElementById('topCode');

        pageTitleText.textContent = 'Result';
        topCodeElement.textContent = topCode;

        function buildAutoplayUrl(url) {
            if (!url) return url;
            try {
                const decoded = decodeURIComponent(url);
                let finalUrl = decoded;
                if (finalUrl.includes('youtube.com/watch')) {
                    finalUrl = finalUrl.replace('watch?v=', 'embed/');
                }
                if (finalUrl.includes('youtube.com/embed')) {
                    if (!finalUrl.includes('autoplay=1')) {
                        finalUrl += finalUrl.includes('?') ? '&autoplay=1&mute=1' : '?autoplay=1&mute=1';
                    }
                }
                return finalUrl;
            } catch (e) {
                return url;
            }
        }

        if (videoUrl) {
            window.location.replace(buildAutoplayUrl(videoUrl));
        } else {
            pageBody.innerHTML = '<div class="empty-state">Video URL is not available.</div>';
        }
    </script>
</body>

</html>
